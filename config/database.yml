default: &default
  adapter: postgresql
  encoding: unicode
  host: localhost
  username: <%= ENV['DB_USERNAME'] %>
  password: <%= ENV['DB_PASSWORD'] %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: furiosa_development

test:
  <<: *default
  database: furiosa_test
  
production:
  <<: *default
  database: furiosa_production
  username: furiosa
  password: <%= ENV["FURIOSA_DATABASE_PASSWORD"] %>
